function ce(l){var m=cc(l);if(!m)return 0;if(l.paiement==="1x")return m;if(l.paiement==="2x")return Math.round(m/2);var c=parseInt(l.paiement);return isNaN(c)?m:c;}
function com(l){return Math.round(ce(l)*0.1);}
function fmtD(v){if(!v)return"";if(typeof v==="string"&&v.indexOf("/")>=0)return v;try{var d=new Date(v);if(!isNaN(d))return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear();}catch(e){}return v;}

function calcR(l){
  if(l.statut!=="closé"||!l.offre)return null;
  var tot=cc(l),enc=ce(l),reste=tot-enc;if(reste<=0)return null;
  var pts=l.date.split("/");if(pts.length!==3)return null;
  var r=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));r.setMonth(r.getMonth()+1);
  return{date:p2(r.getDate())+"/"+p2(r.getMonth()+1)+"/"+r.getFullYear(),half:reste};
}

// Calendly helpers
function extractPhone(inv){
  if(inv.text_reminder_number)return inv.text_reminder_number;
  var qa=inv.questions_and_answers||[];
  for(var i=0;i<qa.length;i++){
    var q=(qa[i].question||"").toLowerCase();
    if(q.indexOf("whatsapp")>=0||q.indexOf("tel")>=0||q.indexOf("phone")>=0||q.indexOf("numéro")>=0||q.indexOf("numero")>=0||q.indexOf("portable")>=0){
      return qa[i].answer||"";
    }
  }
  for(var i=0;i<qa.length;i++){
    var a=(qa[i].answer||"").replace(/[^0-9+]/g,"");
    if(a.length>=8&&a.length<=15)return qa[i].answer||"";
  }
  return"";
}
function extractProv(inv){
  var t=inv.tracking||{};
  var src=[(t.utm_source||""),(t.utm_medium||""),(t.utm_campaign||""),(t.utm_content||"")].join(" ").toLowerCase();
  if(src.indexOf("snap")>=0)return"snap";
  if(src.indexOf("tiktok")>=0)return"tiktok";
  if(src.indexOf("insta")>=0)return"insta";
  if(src.indexOf("vsl")>=0)return"vsl";
  return"";
}

    fetch(SB_URL+"?id=eq."+sbId,{method:"PATCH",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json",Prefer:"return=minimal"},body:JSON.stringify({data:payload})})
      .then(function(r){if(!r.ok)showErr(r.status);})

    fetch(SB_URL,{method:"POST",headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY,"Content-Type":"application/json",Prefer:"return=representation"},body:JSON.stringify({data:payload})})
      .then(function(r){if(!r.ok){showErr(r.status);return null;}return r.json();})
      .then(function(rows){if(rows&&rows[0])sbId=rows[0].id;})
      .catch(function(e){showErr(e.message);});

// Init — merge localStorage + Supabase so local Calendly leads survive page reloads
sbRead(function(raw){
  var remote=null;
  if(raw){try{remote=typeof raw==="string"?JSON.parse(raw):raw;}catch(e){}}
  var local=null;
  try{var lr=localStorage.getItem("crm_local");if(lr)local=JSON.parse(lr);}catch(e){}

  // Collect deleted from both sources
  var rd=(remote&&remote.deleted)||[];
  var ld=(local&&local.deleted)||[];
  rd.forEach(function(d){if(deleted.indexOf(d)<0)deleted.push(d);});
  ld.forEach(function(d){if(deleted.indexOf(d)<0)deleted.push(d);});

  // Start with remote leads as base
  var base=(remote&&remote.leads&&remote.leads.length>0)?remote.leads:[];
  // Merge local leads that aren't in remote (e.g. Calendly leads not yet saved to Supabase)
  var localLeads=(local&&local.leads&&local.leads.length>0)?local.leads:[];
  localLeads.forEach(function(ll){
    if(deleted.indexOf(ll.email+ll.date)>=0)return;
    for(var k=0;k<base.length;k++){
      if(base[k].email===ll.email&&base[k].date===ll.date)return;
    }
    base.unshift(ll);
  });

  leads=base.filter(function(l){return ok(l)&&deleted.indexOf(l.email+l.date)<0;});
  if(!remote||!remote.leads||!remote.leads.length)sbWrite();

  leads.forEach(function(l){
    l.closer=fixEnc(l.closer);
    if(l.email)ke[l.email]=1;
  });
  sl();render();
  syncCalendly();
});

// Calendly API sync
async function syncCalendly(){
  try{
    var dMin=new Date();dMin.setFullYear(dMin.getFullYear()-2);
    var dMax=new Date();dMax.setFullYear(dMax.getFullYear()+1);
    var minTime=dMin.toISOString();
    var maxTime=dMax.toISOString();

    // Get organization URI first (events are org-level, not per-user)
    var meR=await fetch("https://api.calendly.com/users/me",{headers:{Authorization:"Bearer "+CAL_TOKEN}});
    if(!meR.ok){document.getElementById("lsync").textContent="Erreur /users/me: "+meR.status;return;}
    var meData=await meR.json();
    var orgUri=(meData.resource&&meData.resource.current_organization)||"";
    if(!orgUri){document.getElementById("lsync").textContent="Erreur: organisation introuvable";return;}

    var allEvents=[];
    var url="https://api.calendly.com/scheduled_events?organization="+encodeURIComponent(orgUri)+"&count=100&min_start_time="+encodeURIComponent(minTime)+"&max_start_time="+encodeURIComponent(maxTime)+"&sort=start_time:desc";
    while(url){
      var r=await fetch(url,{headers:{Authorization:"Bearer "+CAL_TOKEN}});
      if(!r.ok){
        var errTxt=await r.text().catch(function(){return"";});
        document.getElementById("lsync").textContent="Erreur API: "+r.status+" "+errTxt.slice(0,60);
        return;
      }
      var data=await r.json();
      allEvents=allEvents.concat(data.collection||[]);
      url=(data.pagination&&data.pagination.next_page)?data.pagination.next_page:null;
      if(allEvents.length>=2000)break;
    }

    var newCount=0;var skipCount=0;var heureUpdated=0;
    var batchSize=8;
    for(var i=0;i<allEvents.length;i+=batchSize){
      var batch=allEvents.slice(i,i+batchSize);
      var results=await Promise.all(batch.map(function(ev){
        var evId=ev.uri.split("/").pop();
        return fetch("https://api.calendly.com/scheduled_events/"+evId+"/invitees?count=10",{
          headers:{Authorization:"Bearer "+CAL_TOKEN}
        }).then(function(r){return r.json();}).catch(function(){return{collection:[]};});
      }));

      results.forEach(function(res,idx){
        var ev=batch[idx];
        var d=new Date(ev.start_time);
        var dateStr=p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear();
        (res.collection||[]).forEach(function(inv){
          var key=inv.email+dateStr;
          if(deleted.indexOf(key)>=0){skipCount++;return;}
          for(var j=0;j<leads.length;j++){
            if(leads[j].email===inv.email&&leads[j].date===dateStr){
              // Backfill heure on existing leads that don't have it
              if(!leads[j].heure&&ev.start_time){leads[j].heure=ev.start_time;heureUpdated++;}
              skipCount++;return;
            }
          }
          var lead={
            id:Date.now()+Math.random(),
            nom:inv.name||"",
            email:inv.email||"",
            tel:extractPhone(inv),
            date:dateStr,
            heure:ev.start_time||"",
            closer:"",
            prov:extractProv(inv),
            appel:ev.status==="canceled"?"annulé":"",
            statut:"",
            offre:"",
            paiement:"",
            commPaid:false,
            source:"calendly",
            _ts:Date.now()
          };
          leads.unshift(lead);
          ke[inv.email]=1;
          newCount++;
        });
      });
    }

    document.getElementById("lsync").textContent=allEvents.length+" events Cal · +"+newCount+" leads — "+new Date().toLocaleTimeString("fr-FR");
    document.getElementById("ltxt").textContent="⚡ En direct";

    if(newCount>0||heureUpdated>0){
      sl();save();
      var calPage=document.getElementById("pg-calendrier");
      if(calPage&&calPage.classList.contains("on"))renderCalendar();
      var notif=document.createElement("div");
      notif.style.cssText="position:fixed;top:70px;right:20px;background:#00a86b;color:#fff;padding:10px 16px;border-radius:10px;font-size:13px;font-weight:600;z-index:999";
      notif.textContent=newCount+" nouveau(x) lead(s) Calendly !";
      document.body.appendChild(notif);
      setTimeout(function(){notif.remove();},4000);
    }
  }catch(e){
    console.error("Calendly sync error:",e);
    document.getElementById("lsync").textContent="Erreur sync: "+e.message;
  }
}

function sync(){
  sbRead(function(raw){
    if(!raw){syncCalendly();return;}
    try{
      var data=typeof raw==="string"?JSON.parse(raw):raw;
      if(!data||!data.leads||!data.leads.length){syncCalendly();return;}
      if(window._lastDel&&Date.now()-window._lastDel<8000){syncCalendly();return;}
      var rd=data.deleted||[];
      rd.forEach(function(d){if(deleted.indexOf(d)<0)deleted.push(d);});
      var now5=Date.now()-5000;
      var remoteLeads=data.leads.filter(function(l){return ok(l)&&deleted.indexOf(l.email+l.date)<0;});
      // Merge: start from remote, keep recently-edited local versions, add local-only leads not yet saved
      var merged=remoteLeads.map(function(rl){
        for(var i=0;i<leads.length;i++){
          if(leads[i].email===rl.email&&leads[i].date===rl.date){
            return (leads[i]._ts||0)>now5?leads[i]:rl;
          }
        }
        return rl;
      });
      // Add local leads (from Calendly) not yet persisted to Supabase
      leads.forEach(function(ll){
        if(deleted.indexOf(ll.email+ll.date)>=0)return;
        for(var k=0;k<merged.length;k++){
          if(merged[k].email===ll.email&&merged[k].date===ll.date)return;
        }
        merged.unshift(ll);
      });
      var changed=JSON.stringify(merged)!==JSON.stringify(leads);
      leads=merged;
      leads.forEach(function(l){l.closer=fixEnc(l.closer);});
      if(changed){
        sl();
        try{localStorage.setItem("crm_local",JSON.stringify({leads:leads,deleted:deleted,ts:Date.now()}));}catch(e){}
        render();
      }
    }catch(e){}
    document.getElementById("lsync").textContent="Synchro: "+new Date().toLocaleTimeString("fr-FR");
    document.getElementById("ltxt").textContent="⚡ En direct";
    syncCalendly();
  });
}

function buildJourSelect(){
  var sel=document.getElementById("sel-jour");
  if(!sel)return;
  var JOURS=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  var MOIS=["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];
  var now=new Date();
  function toKey(d){return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear();}
  var todayKey=toKey(now);
  var yest=new Date(now);yest.setDate(yest.getDate()-1);var yestKey=toKey(yest);
  var avantH=new Date(now);avantH.setDate(avantH.getDate()-2);var avantKey=toKey(avantH);
  // Count leads per date
  var counts={};
  leads.forEach(function(l){if(l.date)counts[l.date]=(counts[l.date]||0)+1;});
  // Unique dates sorted desc
  var dates=Object.keys(counts).sort(function(a,b){return dn(b).localeCompare(dn(a));});
  var html='<option value="tous">Tous les jours</option>';
  var special={};
  [todayKey,yestKey,avantKey].forEach(function(k,i){
    if(counts[k]){
      var label=i===0?"Aujourd'hui":i===1?"Hier":"Avant-hier";
      html+='<option value="'+k+'"'+(fil.jour===k?" selected":"")+'>'+label+' · '+counts[k]+' RDV</option>';
      special[k]=1;
    }
  });
  var hasOthers=dates.some(function(d){return !special[d];});
  if(hasOthers)html+='<option disabled>─────────────</option>';
  dates.forEach(function(k){
    if(special[k])return;
    var pts=k.split("/");
    var d=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
    var lbl=JOURS[d.getDay()]+" "+pts[0]+" "+MOIS[d.getMonth()]+" · "+counts[k];
    html+='<option value="'+k+'"'+(fil.jour===k?" selected":"")+'>'+lbl+'</option>';
  });
  if(fil.jour==="tous")sel.value="tous";
  sel.innerHTML=html;
  if(fil.jour!=="tous")sel.value=fil.jour;
}

function escH(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}

function renderCalendar(){
  var JOURS_L=["Dimanche","Lundi","Mardi","Mercredi","Jeudi","Vendredi","Samedi"];
  var JOURS_C=["Dim","Lun","Mar","Mer","Jeu","Ven","Sam"];
  var MOIS=["Jan","Fév","Mar","Avr","Mai","Juin","Juil","Août","Sep","Oct","Nov","Déc"];
  var now=new Date();
  // Monday of current week + offset
  var monday=new Date(now);
  var dow=monday.getDay()||7;
  monday.setDate(monday.getDate()-(dow-1)+(calWeekOff*7));
  monday.setHours(0,0,0,0);
  var days=[];
  for(var i=0;i<7;i++){var d=new Date(monday);d.setDate(d.getDate()+i);days.push(d);}
  function fmt(d){return p2(d.getDate())+"/"+p2(d.getMonth()+1)+"/"+d.getFullYear();}
  function fmtH(iso){if(!iso)return"";try{var d=new Date(iso);return p2(d.getHours())+":"+p2(d.getMinutes());}catch(e){return"";}}
  var todayKey=fmt(now);
  // Build week range label
  var weekLabel=p2(monday.getDate())+" "+MOIS[monday.getMonth()]+" – "+p2(days[6].getDate())+" "+MOIS[days[6].getMonth()]+" "+days[6].getFullYear();
  // Hours 8-20
  var hours=[];for(var h=8;h<=20;h++){hours.push(h);}
  // Map leads by date
  var byDay={};
  days.forEach(function(d){byDay[fmt(d)]=[];});
  leads.forEach(function(l){
    if(!l.date||!byDay[l.date])return;
    byDay[l.date].push(l);
  });
  days.forEach(function(d){
    byDay[fmt(d)].sort(function(a,b){
      var ta=a.heure?new Date(a.heure).getTime():0;
      var tb=b.heure?new Date(b.heure).getTime():0;
      return ta-tb;
    });
  });
  function evCls(l){
    if(l.closer==="Théo")return"theo";
    if(l.closer==="Loïc")return"loic";
    return"none";
  }
  function evHtml(l){
    var h=fmtH(l.heure);
    var clos=l.statut==="closé"?" clos":"";
    var closMark=l.statut==="closé"?' <span style="color:#00d084">✓</span>':"";
    return'<div class="cal-event '+evCls(l)+clos+'" title="'+l.nom+(h?" — "+h:"")+'"><span class="ce-heure">'+(h?h:"")+'</span>'+l.nom+closMark+'</div>';
  }
  // Grid
  var html='<div class="cal-nav">';
  html+='<button onclick="calWeekOff--;renderCalendar()">&#8249; Semaine préc.</button>';
  html+='<span>'+weekLabel+'</span>';
  html+='<button onclick="calWeekOff++;renderCalendar()">Semaine suiv. &#8250;</button>';
  if(calWeekOff!==0)html+='<button onclick="calWeekOff=0;renderCalendar()" style="background:#E8000D22;color:#E8000D;border-color:#E8000D">Aujourd\'hui</button>';
  html+='</div>';
  html+='<div class="cal-legend"><span><i style="background:#7c3aed"></i>Théo</span><span><i style="background:#0ea5e9"></i>Loïc</span><span><i style="background:#444"></i>Non assigné</span><span style="color:#00d084;font-size:10px">✓ = Closé</span></div>';
  html+='<div class="cal-week">';
  // Header row
  html+='<div class="cal-hcell" style="font-size:10px;color:#444">Heure</div>';
  days.forEach(function(d){
    var key=fmt(d);
    var isToday=key===todayKey;
    var cnt=byDay[key].length;
    html+='<div class="cal-hcell'+(isToday?" today":"")+'">';
    html+=JOURS_C[d.getDay()]+'<span class="cal-day-num">'+d.getDate()+'</span>';
    html+='<span style="font-size:10px;color:'+(isToday?"#f59e0b":"#555")+'">'+(cnt?cnt+" RDV":"")+'</span></div>';
  });
  // Row: leads without time (heure inconnue) — shown at top
  var hasNoTime=days.some(function(d){return byDay[fmt(d)].some(function(l){return !l.heure;});});
  if(hasNoTime){
    html+='<div class="cal-tcell" style="color:#555;font-size:9px;line-height:1.2">Heure<br>?</div>';
    days.forEach(function(d){
      var key=fmt(d);
      var isToday=key===todayKey;
      var evs=byDay[key].filter(function(l){return !l.heure;});
      html+='<div class="cal-dcell'+(isToday?" today":"")+'" style="padding:2px">';
      evs.forEach(function(l){html+=evHtml(l);});
      html+='</div>';
    });
  }
  // Time rows 8h-20h
  hours.forEach(function(h){
    html+='<div class="cal-tcell">'+p2(h)+':00</div>';
    days.forEach(function(d){
      var key=fmt(d);
      var isToday=key===todayKey;
      var evs=byDay[key].filter(function(l){
        if(!l.heure)return false;
        var lh=new Date(l.heure).getHours();
        return lh===h;
      });
      html+='<div class="cal-dcell'+(isToday?" today":"")+'">';
      evs.forEach(function(l){html+=evHtml(l);});
      html+='</div>';
    });
  });
  html+='</div>';
  document.getElementById("cal-content").innerHTML=html;
}

function checkFeedback(ts){
  var feedbacks=JSON.parse(localStorage.getItem("fb_data")||"[]");
  feedbacks=feedbacks.map(function(fb){if(fb.ts===ts)fb.checked=!fb.checked;return fb;});
  localStorage.setItem("fb_data",JSON.stringify(feedbacks));
  pushFeedbacks(feedbacks);rFeedback();
}
function deleteFeedback(ts){
  if(!confirm("Supprimer ce feedback ?"))return;
  var feedbacks=JSON.parse(localStorage.getItem("fb_data")||"[]");
  feedbacks=feedbacks.filter(function(fb){return fb.ts!==ts;});
  localStorage.setItem("fb_data",JSON.stringify(feedbacks));
  pushFeedbacks(feedbacks);rFeedback();
}
function editFeedback(ts){
  var feedbacks=JSON.parse(localStorage.getItem("fb_data")||"[]");
  var fb=null;feedbacks.forEach(function(f){if(f.ts===ts)fb=f;});
  if(!fb)return;
  document.getElementById("fb-closer").value=fb.closer||"";
  document.getElementById("fb-date").value=fb.date||"";
  document.getElementById("fb-journee").value=fb.journee||"";
  document.getElementById("fb-leads").value=fb.leads||"";
  window._fbEditTs=ts;
  window.scrollTo({top:0,behavior:"smooth"});
}
function saveFeedback(){
  var closer=document.getElementById("fb-closer").value;
  if(!closer){alert("Sélectionne un closer");return;}
  var date=document.getElementById("fb-date").value;
  var journee=document.getElementById("fb-journee").value.trim();
  var fbLeads=document.getElementById("fb-leads").value.trim();
  if(!journee&&!fbLeads){alert("Remplis au moins un champ");return;}
  var feedbacks=JSON.parse(localStorage.getItem("fb_data")||"[]");
  if(window._fbEditTs){
    feedbacks.forEach(function(fb){if(fb.ts===window._fbEditTs){fb.closer=closer;fb.date=date;fb.journee=journee;fb.leads=fbLeads;}});
    window._fbEditTs=null;
  }else{
    feedbacks.push({closer:closer,date:date,journee:journee,leads:fbLeads,ts:Date.now()});
  }
  localStorage.setItem("fb_data",JSON.stringify(feedbacks));
  pushFeedbacks(feedbacks);rFeedback();
}

    html+='<div class="aci"><div class="acv t">'+d.enc.toLocaleString("fr-FR")+' €</div><div class="acl">Encaissé</div></div>';
    html+='<div class="aci"><div class="acv p" style="font-size:18px">'+tx+'%</div><div class="acl">Taux</div></div>';
    html+='<div class="aci"><div class="acv">'+(d.leads?Math.round(d.ca/d.leads):0).toLocaleString("fr-FR")+' €</div><div class="acl">CA/lead</div></div>';
    html+='<div class="aci"><div class="acv g">'+d.cls+'</div><div class="acl">Closés</div></div>';
    html+='<div class="aci"><div class="acv a">'+d.ns+'</div><div class="acl">No show</div></div>';
    html+='</div></div>';
  });
  html+='</div></div>';

  // Prévisionnel
  var prevT=0,prevL=[];
  leads.forEach(function(l){
    var r=calcR(l);if(!r)return;
    var pts=r.date.split("/");var rd=new Date(parseInt(pts[2]),parseInt(pts[1])-1,parseInt(pts[0]));
    if(rd>=now){prevT+=r.half;prevL.push({nom:l.nom,date:r.date,montant:r.half,closer:l.closer||""});}
  });
  prevL.sort(function(a,b){return dn(a.date).localeCompare(dn(b.date));});
  html+='<div style="background:'+C+';border-radius:12px;border:1px solid '+B+';overflow:hidden">';
  html+='<div style="padding:14px 16px;border-bottom:1px solid '+B+';display:flex;justify-content:space-between;align-items:center">';
  html+='<h3 style="font-size:14px;font-weight:700;color:#fff">Prévisionnel Relances M+1</h3>';
  html+='<span style="font-weight:700;color:#22d3ee;font-size:15px">'+prevT.toLocaleString("fr-FR")+' € attendus</span></div>';
  if(!prevL.length){html+='<div class="empty">Aucune relance prévue</div>';}
  else{
    html+='<div style="overflow-x:auto"><table style="min-width:500px;width:100%"><thead><tr><th>Nom</th><th>Closer</th><th>Date relance</th><th>Montant</th></tr></thead><tbody>';
    prevL.forEach(function(r){
      html+='<tr><td style="font-weight:500;color:#e5e5e5">'+r.nom+'</td>';
      html+='<td>'+(r.closer?'<span style="font-weight:600;color:'+(r.closer==="Théo"?"#7c3aed":"#2563eb")+'">'+r.closer+'</span>':"—")+'</td>';
      html+='<td style="font-size:12px;color:#e5e5e5">'+r.date+'</td>';
      html+='<td style="font-weight:700;color:#22d3ee">'+r.montant.toLocaleString("fr-FR")+' €</td></tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div>';
  wrap.innerHTML=html;
}

function expCSV(){
  var rows=[["#","Nom","Email","Tél","Date RDV","Closer","Source","Appel","Statut","Offre","Paiement","Cash collecté","Cash encaissé","Relance","Commission","Comm payée"]];
  leads.forEach(function(l,i){
    var c1=cc(l),c2=ce(l),c3=com(l);var r=calcR(l);
    rows.push([i+1,l.nom,l.email,l.tel||"",l.date,l.closer||"",l.prov||"",l.appel,l.statut,l.offre?l.offre+" €":"",l.paiement,c1?c1+" €":"",c2?c2+" €":"",r?r.date:"",c3?c3+" €":"",l.commPaid?"Oui":"Non"]);
  });
  var csv=rows.map(function(r){return r.map(function(c){return'"'+String(c).replace(/"/g,'""')+'"';}).join(",");}).join("\n");
  var a=document.createElement("a");a.href="data:text/csv;charset=utf-8,﻿"+encodeURIComponent(csv);a.download="crm.csv";a.click();
}

document.getElementById("modal").addEventListener("click",function(e){if(e.target===this)closeM();});
render();
